name: OperationsHome
options:
  bundleIdPrefix: com.operationshome
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "5.10"
targets:
  OperationsHome:
    type: application
    platform: iOS
    sources:
      - OperationsHome
    info:
      path: OperationsHome/Info.plist
      properties:
        CFBundleDisplayName: 运营小家
        UILaunchScreen: {}
        NSCameraUsageDescription: 用于扫描条形码和二维码添加物品。
        NFCReaderUsageDescription: 后续用于扫描储物空间 NFC 标签。
    entitlements:
      path: OperationsHome/OperationsHome.entitlements
